        oracle_redo_user: "{{ oracle_user_sys | default('sys') }}"
        oracle_redo_pw: "{{ oracle_pw }}"
        oracle_redo_omf_dest: "{{ oracle_omf_redo_dest | default('/opt/oracle/oradata/FREE') }}"
      run_once: true

